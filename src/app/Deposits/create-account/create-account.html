<div class="card flex justify-center container">
    <p-panel header="Customer Information">
        <p-divider />
        <div class="flex items-center gap-4 mb-4">
            <label for="username" class="font-semibold w-24 w">Account Number</label>
            <input pInputText id="username" class="flex-auto" autocomplete="off" [(ngModel)]="AccountNumber"
                readonly="true" />
        </div>
        <div class="flex items-center gap-4 mb-4">
            <label for="username" class="font-semibold w-24 w">Account Name</label>
            <input pInputText id="username" class="flex-auto" autocomplete="off" [(ngModel)]="AccountName" />
        </div>
        <div class="flex items-center gap-4 mb-2">
            <label for="email" class="font-semibold w-24 w">Mobile Number</label>
            <input pInputText id="email" class="flex-auto" autocomplete="off" [(ngModel)]="mobileNumber" />
        </div>
        <div class="flex items-center gap-4 mb-2">
            <label for="email" class="font-semibold w-24 w">Telephone Number (Optional)</label>
            <input pInputText id="email" class="flex-auto" autocomplete="off" [(ngModel)]="telephoneNumber" />
        </div>
        <div class="flex items-center gap-4 mb-2">
            <label for="email" class="font-semibold w-24 w">Email Address (Optional)</label>
            <input pInputText id="email" class="flex-auto" autocomplete="off" [(ngModel)]="emailAddress" />
        </div>

        <div class="card flex justify-center">
            <label for="email" class="font-semibold w-24 w">Select a Customer</label>
            <p-select [options]="identificationTyepes" [(ngModel)]="selectedId" optionLabel="name" [filter]="true"
                filterBy="name" [showClear]="true" placeholder="Select Identification type" class="w-full md:w-56">
                <ng-template #selectedItem let-identificationTyepes>
                    <div class="flex items-center gap-2">

                        <div>{{ identificationTyepes.name }}</div>
                    </div>
                </ng-template>
                <ng-template let-identificationTyepes #item>
                    <div class="flex items-center gap-2">

                        <div>{{ identificationTyepes.name }}</div>
                    </div>
                </ng-template>
            </p-select>

        </div>
        <div class="flex items-center gap-4 mb-2">
            <label for="email" class="font-semibold w-24 w">Identification Number</label>
            <input pInputText id="email" class="flex-auto" autocomplete="off" [(ngModel)]="identificationNumber" />
        </div>
        <div class="card flex justify-center  gap-4 mb-2">
            <label for="email" class="font-semibold w-24 w">Address (Optional)</label>
            <textarea rows="2" cols="30" pTextarea [(ngModel)]="address"
                placeholder="Enter customer address"></textarea>
        </div>
        <div class="card flex justify-center  gap-4 mb-2">
            <label for="email" class="font-semibold w-24 w">Additional Information (Optional)</label>
            <textarea rows="2" cols="30" pTextarea [(ngModel)]="remarks"
                placeholder="Enter customer address"></textarea>
        </div>
    </p-panel>
    <div>
        <div class="image-container">
            <div class="card">
                <label for="idImage" class="font-semibold w-24 file" severity="info">
              
                     <i class="pi pi-camera" style="color: slateblue" style="font-size: 2rem"></i>
                           ID CARD
                     <input type="file" id="idImage" class="file-input" (change)="onIdImageUpload($event)" #fileUpload>
                </label>
                @if(id_image){
                <img [src]="idimage_preview" alt="" class="max-w-full max-h-full" id="idImage"/>
                }
            </div>
        </div>
        <div class="image-container">
            <div class="card">
                <label for="passposrt" class="font-semibold w-24 file" >
                    <i class="pi pi-camera" style="color: slateblue " style="font-size: 2rem"></i>
                    Passport Picture
                <input type="file" class="file-input" id="passposrt" (change)="onPassportUpload($event)" #fileUpload1>
                </label>
                @if(id_image){
                <img [src]="passport_preview" alt="" class="max-w-full max-h-full" />
                }
            </div>
        </div>
          <p-divider />
        <div class="card flex justify-center">
            <p-button label="CREATE ACCOUNT" icon="pi pi-user-plus" [text]="true" severity="info"  [raised]="true" (click)="openAccount()" />
        </div>
</div>
    </div>
    
<p-toast />
