<div class="card table-style">
   <header class="mb-4">MANAGE SUPPLIERS</header>
        
        
    <p-table [value]="productList" dataKey="id" stripedRows="true" [tableStyle]="{ 'min-width': '50rem' }"
        #dt1    [value]="productList"
                [rows]="10"
                [rowsPerPageOptions]="[10, 25, 50]"
                [loading]="loading"
                [paginator]="true"
                [globalFilterFields]="['serialnumber ', 'brandid', 'title', 'marketprice']"
                [tableStyle]="{ 'min-width': '75rem' }"
            >
                <ng-template #caption>
                    <div class="flex">
                        <p-button label="Clear" [outlined]="true" icon="pi pi-filter-slash" (click)="clear(dt1)" />
                        <p-iconfield iconPosition="left" class="ml-auto">
                            <p-inputicon>
                                <i class="pi pi-search"></i>
                            </p-inputicon>
                            <input pInputText type="text" (input)="onGlobalFilter(dt1, $event)" placeholder="Search keyword" />
                        </p-iconfield>
                    </div>
                </ng-template>
        <ng-template #header>
            <tr>
                <th style="width:20%">Product ID</th>
                <th style="width:20%">Brand ID</th>
                <th style="width:20%">Product Name</th>
                <th style="width:10%">Product Photo</th>
                <th style="width:20%">Supplier Price</th>
                <th style="width:20%">Action</th>
            </tr>
        </ng-template>
        <ng-template #body let-productList let-editing="editing">
            <tr>
                <td>
                    {{ productList.serialnumber }}
                </td>
                <td>
                    {{ productList.brandid }}
                </td>
                <td>
                    {{ productList.title }}
                </td>
                <td>
                    <img [src]="productList.imageurl" [alt]="productList.time" class="w-24 rounded table-img" />
                </td>
                <td [pEditableColumn]="productList.marketprice" pEditableColumnField="marketprice">
                    <p-cellEditor  pTooltip="Click to add Price" >
                        <ng-template #input>
                            <input pInputText type="text" [(ngModel)]="productList.marketprice" fluid
                                placeholder="Add marketprice" pInputText (keyup.enter)="saveEdit(productList)"/>
                        </ng-template>
                        <ng-template #output>
                            {{ productList.marketprice | currency: 'Gh₵' }}
                        </ng-template>
                    </p-cellEditor>
                </td>
                <td>
                      <div class="card flex justify-center gap-4">
                    <div class="card flex justify-center">
                        <p-button label="Save" icon="pi pi-save" (onClick)="saveEdit(productList)" />
                    </div>
                     <div class="card flex justify-center">
                        <p-button label="Delete" icon="pi pi-trash" (onClick)="onDelete(productList)" severity="danger" />
                    </div>
                      </div>
                </td>
            </tr>
        </ng-template>
    </p-table>

</div>
    <p-toast />
