<p-toast></p-toast>
<div class="card table-style">
    <p-toolbar>
        <ng-template #start>
        </ng-template>
        <ng-template #center>
            <div class="card flex justify-center">

                <div class="card flex justify-center">
                    <p-button type="button" styleClass="min-w-48" icon="storemanager" (onClick)="op.toggle($event)"
                        variant="text" severity="secondary" label="Manage Store" severity="info" variant="text" />
                    <p-popover #op>
                        <div class="card-wrapper">
                            <span class="font-medium block mb-2"> <i class="pi pi-cog"
                                    style="font-size: 1rem"></i>Options</span>
                            <p-divider />
                            <div class="btn-pops">
                                    <p-button label="Stores " icon="access" iconPos="left" severity="secondary" (onClick)="createStore()" />
                                  
                                          <p-button label="Store Type " icon="access" iconPos="left" severity="secondary" (onClick)="storeType()" />
                           

                                <p-button label="Receive Stock" icon="store" severity="secondary"
                                    (onClick)="recieveStock()" serverity="info" variant="text" />


                                <p-button icon="manager" variant="text" label='Manage Identity' class="mr-2" text
                                    severity="success" severity="info" />
                                <p-button icon="wh-man" variant="text" label='Open a Store' class="mr-2" text
                                    severity="info" severity="info" variant="text" />
                                <p-button icon="operationcontrol" variant="text" label='Initialize Control' class="mr-2"
                                    text severity="info" variant="text" />


                            </div>
                        </div>
                    </p-popover>
                </div>
            </div>
        </ng-template>
    </p-toolbar>
    <!-- <header class="table-style wearehouse">
        <i class="wearehouse" style="font-size: 2.5rem"></i><span> Wearhouse Manager</span>
    </header> -->
</div>
