<div class="card table-style">
    <p-toolbar>
        <ng-template #start>
            <p-button icon="pi pi-plus" class="mr-2" text severity="secondary" />
            <p-button icon="pi pi-print" class="mr-2" text severity="secondary" />
            <p-button icon="pi pi-upload" text severity="secondary" />
        </ng-template>
        <ng-template #center>
            <div class="card flex justify-center">

                <div class="card flex justify-center">
                    <p-button type="button" (onClick)="toggle($event)" styleClass="min-w-48" icon="pi pi-ellipsis-v"
                        label="Manage" />
                    <p-popover #op>
                        <div class="card-wrapper">
                            <span class="font-medium block mb-2" > <i class="pi pi-cog" style="font-size: 1rem"></i>Options</span>
                            <p-divider />
                            <div class="btn-pops">
                                <p-button label="New Identity" icon="pi pi-plus" (onClick)="newIdentity()" severity="secondary" />
                                <p-button label="New Wearhouse" icon="wearhouse"  severity="secondary"/>
                                <p-button label="Assign Manager" icon="Manager" iconPos="left" severity="secondary" />
                                <p-button label="Access" icon="access" iconPos="left" severity="secondary" />
                            </div>
                        </div>
                    </p-popover>
                </div>
            </div>
        </ng-template>
    </p-toolbar>
    <header class="table-style wearehouse">
        <i class="wearehouse" style="font-size: 2.5rem"></i><span> Wearhouse Manager</span>
    </header>
</div>
@if(isIdentity()){

<p-dialog header="New Identity" [(visible)]="isVisible" [style]="{ width: '30rem' }">
    <span class="p-text-secondary block mb-1">Create a warehouse identity to represent the type of wearhouse</span>
    <p-divider/>
      <div class="flex items-center gap-4 mb-4">
        <label for="username" class="font-semibold w-24">Identity Number <i class="pi pi-sparkles" style="font-size: 1rem; color: gold;" pTooltip="Unique ID to identiy Warehouse object"></i></label>
        <input pInputText id="identity" class="flex-auto" readonly="true" autocomplete="off" [(ngModel)]="identity" />
    </div>
    <div class="flex items-center gap-4 mb-4">
        <label for="username" class="font-semibold w-24">Identity Title<i class="pi pi-sparkles" style="font-size: 1rem;color: gold;" pTooltip="Use common name for easy memorisation"></i></label>
        <input pInputText id="username" class="flex-auto" autocomplete="off"[autofocus]="true" [(ngModel)]="identityName" />
    </div>
    <div class="flex items-center gap-4 mb-8">
        <label for="email" class="font-semibold w-24">Description <i class="pi pi-sparkles" style="font-size: 1rem; color: gold;" pTooltip="Provide brief description of your warehouse object"></i></label>
        <textarea rows="5" cols="30" pTextarea [(ngModel)]="identitydescription"></textarea>
    </div>
    <p-divider/>
    <div class="flex justify-end gap-2 ">
        <p-button label="Cancel" severity="danger" (click)="isVisible = false"  />
        <p-button label="Save"  severity="secondary" (click)="saveIdentity(); isVisible = false" />
    </div>
</p-dialog>

<p-toast/>
}
