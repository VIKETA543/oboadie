<div class="card">
    <p-toolbar>
        <ng-template #start>
  
                 <p-avatar image="assets/logo/oboadie.jpeg" class="mr-5" size="xlarge" shape="circle"/>
            <div>
            <span class="font-bold text-lg mr-2 storename">{{storeData[0]?.storename}}</span>
            <h2>OBOADIE NYAME ENTERPRISE</h2>
            </div>
        </ng-template>
        <ng-template #center>

        </ng-template>
        <ng-template #end>
            <span class="font-bold text-lg mr-4 storename">
                <label class="mr-2 name">  {{USER_CREDENTIALS?.fullname}} {{USER_CREDENTIALS?.last_name}}</label>
              
                <!-- <i class="pi pi-cog" style="font-size: 2rem"></i> -->
                    <p-avatar class="mr-2" size="xlarge" shape="circle" image="{{USER_CREDENTIALS?.photo_id_url}}"
                shape="circle" size="large" >
       
                </p-avatar>
            </span>
         
        </ng-template>
    </p-toolbar>
</div>
<p-toast />
<div class="card">
    <p-toolbar  class="toobar-btn">

        <ng-template #start>
               <p-button icon="pi pi-home" label="Home" pTooltip="Prepare Cash Sales" class="mr-2" 
                severity="contrast" (onClick)="return()" />
            <p-button icon="pi pi-cart-plus" label="Cash Sales" pTooltip="Prepare Cash Sales" class="mr-2" 
                severity="contrast" (onClick)="cashSales()" />
            <p-button icon="pi pi-print" label='Credit Sales' pTooltip="Prepare Credit Sales" class="mr-2" 
                severity="contrast" (onClick)="creditSales()" />
            <p-button icon="pi pi-upload" label="Deposit" Make Deposit  severity="contrast"  class="mr-2"
                routerLink="new-deposit" />
            <p-button icon="pi pi-user" label="Create Account" severity="contrast" routerLink="create-account"  class="mr-2" />
            <p-button icon="pi pi-upload" label="Return Sales" pTooltip="Process Return Item"  class="mr-2" 
                severity="contrast" />
            <p-button icon="pi pi-upload" label="CRM" pTooltip="Customer Relation management"  severity="contrast"  class="mr-2"
                routerLink="crm-manager" />
            <p-button icon="pi pi-upload" label="Profoma Invoice" pTooltip="Profoma Invoince"  severity="contrast"  class="mr-2"
                routerLink="profoma-invoice" />
        </ng-template>
        <ng-template #center>

        </ng-template>
        <ng-template #end>

        </ng-template>
    </p-toolbar>
</div>
<p-divider></p-divider>
<div>

    <router-outlet></router-outlet>
</div>
