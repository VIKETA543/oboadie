<div class="scanner-container">
  <h2>Scan Item</h2>

  <zxing-scanner
    *ngIf="scannerEnabled"  [formats]="allowedFormats" (scanSuccess)="onCodeResult($event)"  (camerasFound)="onCamerasFound($event)" (permissionResponse)="onHasPermission($event)" [autofocusEnabled]="true">
  </zxing-scanner>

  <div class="controls">
    <p-button severity="info" (click)="toggleScanner()" icon="pi pi-barcode" label="{{ scannerEnabled() ? 'Stop Scanner' : 'Start Scanner' }}"/>
  
  </div>

  <div *ngIf="lastResult" class="result-box">
    <strong>Result:</strong> {{ lastResult }}
  </div>

  <p class="error" *ngIf="debugInfo">{{ debugInfo }}</p>
</div>
