<div class="card flex justify-center items-center gap-4 centered-wrapper">
    <p-panel header="Password Reset" [style]="{ width: '100rem' }">
        <div class="card flex flex-col items-center gap-4 ">
            <input pInputText class="w-full" [(ngModel)]="emailAddress" type="text" pSize="large" placeholder="Enter email address" />
        </div>
<p-divider></p-divider>
         
        <div class="flex flex-wrap gap-4 justify-right w-full">
            <p-button label="Continue" icon="pi pi-email" iconPos="left" class="w-full" severity="contrast" (onClick)="onContinue()" />
        </div>

        @if(message){
            <div class="card flex justify-center items-center gap-4">
            <p-message severity="error">
                <span class="ms-2">{{message}}</span>
            </p-message>
        </div>
        }
    </p-panel>

</div>
